name: Auto Update Valorant Version

on:
  schedule:
    - cron: '*/30 * * * *' # 每 6 小时自动运行
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # 运行你的 Python 脚本（在此处安全地注入 Secret Key）
    - name: Run script
      env:
        HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }} # 将 GitHub 保险箱里的值绑定到环境变量
      run: python update_version.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto update data.json" && git push)

    # 你原有的更新 data.json 并 git push 的步骤 ...
    - name: Send to Discord
      env:
          # 确保这个 Action 的仓库 Settings -> Secrets 里也有这个变量
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }} 
      run: |
          VERSION=$(node -p "require('./data.json').version")
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "🚀 Valorant客户端版本已自动更新！",
                   "color": 15158332, 
                   "fields": [
                     {"name": "最新版本号", "value": "`'$VERSION'`", "inline": true}
                   ],
                   "footer": {"text": "触发源: GitHub Actions 自动化"}
                 }]
               }' $DISCORD_WEBHOOK
