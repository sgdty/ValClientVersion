name: Discord Notification on Version Update

on:
  push:
    branches:
      - main
    paths:
      - 'data.json' # 只有当 data.json 被修改时才触发

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read JSON Version
        id: read_version
        run: |
          # 使用 node 简单快速地解析 json 文件中的 version 字段
          # 假设你的 JSON 格式是 {"version": "1.0.1"}，如果字段名不同请自行修改下方 'version'
          VERSION=$(node -p "require('./data.json').version")
          echo "NEW_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 构建一个漂亮的 Discord Embed 消息
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "🚀 Valorant客户端版本已更新！",
                   "color": 15158332, 
                   "fields": [
                     {
                       "name": "最新版本号",
                       "value": "`'${{ env.NEW_VERSION }}'`",
                       "inline": true
                     },
                     {
                       "name": "更新文件",
                       "value": "[data.json](https://github.com/${{ github.repository }}/blob/main/data.json)",
                       "inline": true
                     }
                   ],
                   "footer": {
                     "text": "提交者: ${{ github.actor }}"
                   },
                   "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                 }]
               }' $DISCORD_WEBHOOK
